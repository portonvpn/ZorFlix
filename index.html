<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZorFlix</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red: #e50914; --red-dark: #b00710; --red-glow: rgba(229,9,20,0.35);
  --bg: #0a0a0a; --bg2: #111; --bg3: #181818; --bg4: #222; --bg5: #2a2a2a;
  --txt: #fff; --txt2: #aaa; --txt3: #555; --txt4: #777;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --glass: rgba(10,10,10,0.7);
  --radius: 8px;
}
.light-mode {
  --bg: #f0f0f0; --bg2: #e0e0e0; --bg3: #d5d5d5; --bg4: #ccc; --bg5: #bbb;
  --txt: #0a0a0a; --txt2: #444; --txt3: #999; --txt4: #777;
  --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.16);
  --glass: rgba(240,240,240,0.85);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;overflow-x:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.25)}

#nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:60px;padding:0 28px;
  display:flex;align-items:center;gap:16px;
  background:linear-gradient(to bottom,rgba(10,10,10,.97) 0%,transparent 100%);
  backdrop-filter:blur(8px);
  transition:background .3s,box-shadow .3s;
}
#nav.scrolled{background:rgba(10,10,10,.96);box-shadow:0 1px 0 var(--border)}
.light-mode #nav{background:linear-gradient(to bottom,rgba(240,240,240,.97) 0%,transparent 100%)}
.light-mode #nav.scrolled{background:rgba(240,240,240,.96)}
.logo{font-family:'Bebas Neue',cursive;font-size:2rem;color:var(--red);letter-spacing:5px;cursor:pointer;flex-shrink:0;user-select:none}
.nav-links{display:flex;gap:4px;margin-left:8px}
.nav-link{
  padding:6px 12px;border-radius:6px;font-size:.83rem;font-weight:500;
  color:var(--txt2);cursor:pointer;transition:color .15s,background .15s;white-space:nowrap;
}
.nav-link:hover,.nav-link.active{color:var(--txt);background:rgba(255,255,255,.08)}
.light-mode .nav-link:hover,.light-mode .nav-link.active{background:rgba(0,0,0,.07)}
.nav-spacer{flex:1}
.search-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);padding:7px 13px;transition:border .2s,width .3s;width:220px;
}
.search-wrap:focus-within{border-color:var(--border2)}
.search-wrap svg{flex-shrink:0;opacity:.4}
#search-input{
  background:none;border:none;outline:none;color:var(--txt);
  font-family:'DM Sans',sans-serif;font-size:.85rem;width:100%;
}
#search-input::placeholder{color:var(--txt3)}
.kbd-hint{font-size:.65rem;border:1px solid var(--border2);border-radius:4px;padding:1px 5px;color:var(--txt3);flex-shrink:0}
.nav-icon-btn{
  width:36px;height:36px;border-radius:8px;background:transparent;
  border:none;color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;flex-shrink:0;
}
.nav-icon-btn:hover{background:rgba(255,255,255,.09);color:var(--txt)}
.light-mode .nav-icon-btn:hover{background:rgba(0,0,0,.07)}
.watchlist-badge{
  position:relative;
}
.watchlist-badge .badge-count{
  position:absolute;top:-4px;right:-4px;
  background:var(--red);color:#fff;font-size:.6rem;font-weight:700;
  width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  display:none;
}
.hamburger{display:none}
@media(max-width:700px){
  .nav-links,.search-wrap,.kbd-hint{display:none}
  .hamburger{display:flex}
  #mobile-search{display:block}
}
#mobile-search{
  display:none;padding:0 16px 10px;
}
#mobile-search .search-wrap{width:100%}

#mobile-menu{
  display:none;position:fixed;top:60px;left:0;right:0;z-index:490;
  background:rgba(10,10,10,.97);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:12px 16px;
}
#mobile-menu .nav-link{display:block;padding:10px 12px;font-size:.9rem}

#hero{height:68vh;min-height:480px;position:relative;overflow:hidden}
.hero-bg{
  position:absolute;inset:0;background-size:cover;background-position:center top;
  transition:opacity .6s ease;
}
.hero-bg-next{position:absolute;inset:0;background-size:cover;background-position:center top;opacity:0}
.hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(105deg,rgba(10,10,10,.93) 0%,rgba(10,10,10,.6) 40%,rgba(10,10,10,.1) 70%,transparent 100%),
             linear-gradient(to top,rgba(10,10,10,1) 0%,rgba(10,10,10,.5) 30%,transparent 60%);
}
.light-mode .hero-grad{
  background:linear-gradient(105deg,rgba(240,240,240,.93) 0%,rgba(240,240,240,.6) 40%,rgba(240,240,240,.1) 70%,transparent 100%),
             linear-gradient(to top,rgba(240,240,240,1) 0%,rgba(240,240,240,.5) 30%,transparent 60%);
}
.hero-content{
  position:absolute;bottom:60px;left:52px;max-width:520px;
  animation:fadeUp .5s ease both;
}
@media(max-width:600px){.hero-content{left:20px;bottom:40px;max-width:calc(100vw - 40px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.hero-tag{font-size:.7rem;font-weight:600;letter-spacing:3px;color:var(--red);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.hero-tag::after{content:'';display:inline-block;width:28px;height:2px;background:var(--red);border-radius:2px}
.hero-title{font-family:'Bebas Neue',cursive;font-size:3.8rem;letter-spacing:2px;line-height:1;margin-bottom:10px}
@media(max-width:600px){.hero-title{font-size:2.6rem}}
.hero-meta{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.hero-rating{background:var(--red);color:#fff;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:700}
.hero-year{color:var(--txt2);font-size:.84rem}
.hero-desc{
  color:var(--txt2);font-size:.88rem;line-height:1.65;margin-bottom:20px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-primary{
  background:var(--red);color:#fff;border:none;
  padding:11px 24px;border-radius:6px;font-size:.9rem;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s,transform .1s,box-shadow .2s;
  display:flex;align-items:center;gap:7px;
}
.btn-primary:hover{background:var(--red-dark);transform:scale(1.03);box-shadow:0 6px 20px var(--red-glow)}
.btn-secondary{
  background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);
  padding:11px 20px;border-radius:6px;font-size:.9rem;font-weight:500;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;
  display:flex;align-items:center;gap:7px;
}
.btn-secondary:hover{background:rgba(255,255,255,.2)}
.btn-list{
  background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18);
  padding:11px 16px;border-radius:6px;font-size:.9rem;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s,border .2s;
  display:flex;align-items:center;gap:7px;
}
.btn-list:hover{background:rgba(255,255,255,.18)}
.btn-list.in-list{border-color:var(--red);color:var(--red)}

.hero-dots{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:6px;align-items:center}
.hero-dot{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.25);cursor:pointer;transition:all .3s}
.hero-dot.active{width:22px;background:var(--red)}
.hero-arrows{position:absolute;top:50%;transform:translateY(-50%);display:flex;justify-content:space-between;width:100%;padding:0 12px;pointer-events:none}
.hero-arrow{
  width:38px;height:38px;border-radius:50%;background:var(--glass);border:1px solid var(--border2);
  color:#fff;cursor:pointer;pointer-events:all;
  display:flex;align-items:center;justify-content:center;
  opacity:.6;transition:opacity .2s,background .2s;backdrop-filter:blur(6px);
}
.hero-arrow:hover{opacity:1;background:rgba(229,9,20,.5)}

#main-content{padding-top:12px}
.section-block{padding-bottom:36px}
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;margin-bottom:12px;
}
.section-label{
  font-size:.78rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--txt);border-bottom:2px solid var(--red);padding-bottom:2px;display:inline-block;
}
.see-all-btn{font-size:.75rem;color:var(--txt2);cursor:pointer;transition:color .15s;white-space:nowrap}
.see-all-btn:hover{color:var(--red)}

.row-outer{position:relative}
.row-fade-left{
  position:absolute;left:0;top:0;bottom:0;width:60px;z-index:5;pointer-events:none;
  background:linear-gradient(to right,var(--bg),transparent);display:none;
}
.row-fade-right{
  position:absolute;right:0;top:0;bottom:0;width:60px;z-index:5;pointer-events:none;
  background:linear-gradient(to left,var(--bg),transparent);
}
.row-scroll{
  display:flex;gap:8px;overflow-x:auto;padding:0 28px 8px;
  scroll-snap-type:x mandatory;scrollbar-width:none;
}
.row-scroll::-webkit-scrollbar{display:none}
.row-btn{
  position:absolute;top:50%;transform:translateY(-50%);z-index:10;
  width:34px;height:34px;border-radius:50%;
  background:var(--glass);border:1px solid var(--border2);backdrop-filter:blur(8px);
  color:#fff;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  transition:background .2s;
}
.row-outer:hover .row-btn{display:flex}
.row-btn:hover{background:rgba(229,9,20,.6)}
.row-btn-left{left:6px}
.row-btn-right{right:6px}

.card{
  flex:none;width:150px;border-radius:8px;overflow:hidden;
  cursor:pointer;position:relative;aspect-ratio:2/3;background:var(--bg3);
  transition:transform .22s,box-shadow .22s,z-index 0s;
  scroll-snap-align:start;
}
@media(max-width:500px){.card{width:120px}}
.card:hover{transform:scale(1.07);box-shadow:0 10px 34px rgba(0,0,0,.75),0 0 0 1px rgba(229,9,20,.2);z-index:5}
.card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card:hover img{transform:scale(1.05)}
.card-overlay{
  position:absolute;inset:0;opacity:0;transition:opacity .2s;
  background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.3) 50%,transparent 100%);
  display:flex;flex-direction:column;justify-content:flex-end;padding:10px;
}
.card:hover .card-overlay{opacity:1}
.card-title{font-size:.72rem;font-weight:600;line-height:1.3;margin-bottom:4px}
.card-meta{font-size:.65rem;color:var(--txt2);display:flex;align-items:center;gap:6px}
.card-rating{color:#f5c518;font-size:.65rem;font-weight:700}
.card-badges{position:absolute;top:6px;left:6px;display:flex;flex-direction:column;gap:3px}
.badge{font-size:.55rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:2px 5px;border-radius:3px;line-height:1}
.badge-new{background:var(--red);color:#fff}
.badge-top{background:#f5c518;color:#000}
.badge-tv{background:rgba(0,0,0,.65);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15)}
.card-rating-top{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);color:#f5c518;font-size:.62rem;font-weight:700;padding:2px 5px;border-radius:4px;display:flex;align-items:center;gap:2px}
.card-play{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.7);
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s,transform .2s;
}
.card:hover .card-play{opacity:1;transform:translate(-50%,-50%) scale(1)}
.card-list-btn{
  position:absolute;bottom:36px;right:8px;
  width:24px;height:24px;border-radius:50%;
  background:rgba(0,0,0,.5);border:1.5px solid rgba(255,255,255,.35);
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s,background .15s;font-size:.7rem;
}
.card:hover .card-list-btn{opacity:1}
.card-list-btn:hover{background:var(--red);border-color:var(--red)}
.card-list-btn.in-list{background:var(--red);border-color:var(--red)}

.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:400% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.skeleton-card{flex:none;width:150px;aspect-ratio:2/3;border-radius:8px}
@media(max-width:500px){.skeleton-card{width:120px}}

#detail-page{display:none;min-height:100vh;padding-top:60px}
.detail-backdrop{height:50vh;position:relative;overflow:hidden}
.detail-backdrop-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(3px);transform:scale(1.07)}
.detail-backdrop-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,10,10,.45) 0%,rgba(10,10,10,1) 100%)}
.light-mode .detail-backdrop-grad{background:linear-gradient(to bottom,rgba(240,240,240,.45) 0%,rgba(240,240,240,1) 100%)}
.detail-layout{
  padding:0 28px 60px;
  display:grid;grid-template-columns:240px 1fr;
  gap:32px;margin-top:-90px;position:relative;z-index:2;
}
@media(max-width:700px){.detail-layout{grid-template-columns:1fr;margin-top:-40px}}
.detail-poster{width:100%;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.85);display:block}
@media(max-width:700px){.detail-poster{width:130px;margin-bottom:12px}}
.detail-title{font-family:'Bebas Neue',cursive;font-size:3rem;letter-spacing:2px;line-height:1.05;margin-bottom:6px}
@media(max-width:600px){.detail-title{font-size:2.2rem}}
.detail-tagline{color:var(--txt2);font-style:italic;font-size:.85rem;margin-bottom:12px}
.detail-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.star-badge{background:var(--red);color:#fff;padding:3px 9px;border-radius:4px;font-size:.75rem;font-weight:700;display:flex;align-items:center;gap:4px}
.meta-item{color:var(--txt2);font-size:.84rem;display:flex;align-items:center;gap:4px}
.genre-pill{background:var(--bg3);border:1px solid var(--border);color:var(--txt2);padding:3px 10px;border-radius:20px;font-size:.73rem}
.detail-overview{color:var(--txt2);line-height:1.75;font-size:.9rem;margin-bottom:22px;max-width:700px}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.detail-stats{display:flex;gap:24px;margin-bottom:20px;flex-wrap:wrap}
.detail-stat{font-size:.82rem}
.detail-stat label{color:var(--txt3);display:block;margin-bottom:2px;font-size:.72rem;text-transform:uppercase;letter-spacing:1px}

.cast-section{margin-bottom:28px}
.cast-section h3{font-size:.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);margin-bottom:12px}
.cast-row{display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:6px}
.cast-row::-webkit-scrollbar{display:none}
.cast-card{flex:none;text-align:center;width:80px}
.cast-photo{width:64px;height:64px;border-radius:50%;overflow:hidden;margin:0 auto 6px;background:var(--bg3);border:2px solid var(--border2)}
.cast-photo img{width:100%;height:100%;object-fit:cover}
.cast-photo .cast-initial{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:1.4rem;color:var(--txt3)}
.cast-name{font-size:.65rem;font-weight:600;line-height:1.3;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cast-char{font-size:.6rem;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

#player-wrap{
  background:#000;border-radius:10px;overflow:hidden;
  border:1px solid var(--border);margin-bottom:22px;display:none;
  animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#player-wrap iframe{width:100%;display:block;aspect-ratio:16/9;outline:none;border:none;min-height:360px}
.player-bar{
  background:var(--bg3);border-top:1px solid var(--border);
  padding:9px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.now-playing{font-size:.78rem;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.now-playing b{color:var(--red)}
.close-player-btn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:.78rem;padding:3px 8px;border-radius:4px;transition:color .15s,background .15s;flex-shrink:0;white-space:nowrap}
.close-player-btn:hover{color:var(--txt);background:rgba(255,255,255,.08)}

.se-select {
  background: var(--bg4); border: 1px solid var(--border); color: var(--txt);
  padding: 6px 10px; border-radius: 6px; outline: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: .8rem;
}
.se-select:hover { border-color: var(--border2); }
.se-container { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.detail-tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0}
.detail-tab{padding:8px 16px;font-size:.82rem;font-weight:600;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.detail-tab.active{color:var(--txt);border-bottom-color:var(--red)}
.tab-content{display:none}
.tab-content.active{display:block}

#search-page{display:none;min-height:100vh;padding:80px 28px 60px}
.search-page-header{margin-bottom:20px}
.search-page-title{font-family:'Bebas Neue',cursive;font-size:2.5rem;letter-spacing:2px;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.search-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-tabs{display:flex;gap:2px;background:var(--bg3);border-radius:7px;padding:3px}
.filter-tab{padding:5px 12px;border-radius:5px;font-size:.75rem;font-weight:600;cursor:pointer;color:var(--txt2);transition:background .15s,color .15s}
.filter-tab.active{background:var(--red);color:#fff}
.sort-select{background:var(--bg3);border:1px solid var(--border);color:var(--txt);font-size:.78rem;padding:6px 10px;border-radius:6px;outline:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.search-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.search-empty{text-align:center;padding:60px 0;color:var(--txt3)}
.search-empty svg{opacity:.2;margin-bottom:14px}
.search-history{margin-bottom:20px}
.search-history h4{font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);margin-bottom:10px}
.history-items{display:flex;flex-wrap:wrap;gap:8px}
.history-chip{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.78rem;color:var(--txt2);cursor:pointer;display:flex;align-items:center;gap:7px;transition:border-color .15s,color .15s}
.history-chip:hover{border-color:var(--red);color:var(--txt)}
.history-chip-x{color:var(--txt3);font-size:.7rem;cursor:pointer}
.history-chip-x:hover{color:var(--red)}

#list-page{display:none;min-height:100vh;padding:80px 28px 60px}
.list-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;justify-content:space-between}
.list-header h1{font-family:'Bebas Neue',cursive;font-size:2.8rem;letter-spacing:2px;display:flex;align-items:center;gap:10px}
.list-count{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:.8rem;color:var(--txt2);font-family:'DM Sans',sans-serif;font-weight:500}
.list-filter-tabs{display:flex;gap:2px;background:var(--bg3);border-radius:7px;padding:3px}
.list-empty{text-align:center;padding:80px 0;color:var(--txt3)}
.list-empty h3{font-size:1.2rem;margin-bottom:8px;color:var(--txt2)}
.list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}

#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{
  background:var(--bg2);border:1px solid var(--border2);border-radius:8px;
  padding:10px 16px;font-size:.82rem;font-weight:500;color:var(--txt);
  box-shadow:0 8px 24px rgba(0,0,0,.6);
  pointer-events:all;opacity:0;transform:translateX(20px);
  transition:opacity .25s,transform .25s;max-width:260px;
  display:flex;align-items:center;gap:8px;
}
.toast.show{opacity:1;transform:translateX(0)}
.toast-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.toast-dot.red{background:var(--red)}
.toast-dot.green{background:#22c55e}

#back-btn{
  position:fixed;top:13px;left:100px;z-index:510;display:none;
  background:rgba(10,10,10,.75);border:1px solid var(--border2);
  color:var(--txt2);padding:6px 12px;border-radius:6px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.78rem;
  backdrop-filter:blur(8px);transition:background .15s,color .15s;
  display:none;align-items:center;gap:5px;
}
#back-btn:hover{background:rgba(255,255,255,.1);color:var(--txt)}

.hidden{display:none!important}
.fade-in{animation:fadeIn .35s ease both}
.no-results{text-align:center;padding:40px;color:var(--txt3);font-size:.9rem}

#search-dropdown{
  position:absolute;top:100%;left:0;right:0;margin-top:6px;
  background:var(--bg2);border:1px solid var(--border2);border-radius:10px;
  box-shadow:0 12px 40px rgba(0,0,0,.7);z-index:600;overflow:hidden;
  display:none;
}
#search-dropdown.open{display:block}
.dropdown-item{
  display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;
  transition:background .12s;font-size:.82rem;
}
.dropdown-item:hover{background:rgba(255,255,255,.07)}
.dropdown-poster{width:30px;height:44px;border-radius:4px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.dropdown-info{flex:1;min-width:0}
.dropdown-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dropdown-year{font-size:.7rem;color:var(--txt3)}

.progress-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.15)}
.progress-fill{height:100%;background:var(--red);border-radius:0 2px 2px 0}

@media(max-width:700px){
  .detail-layout{padding:0 16px 40px}
  #hero .hero-content{left:16px}
  .section-header{padding:0 16px}
  .row-scroll{padding:0 16px 8px}
  #search-page,#list-page{padding:80px 16px 60px}
}
</style>
</head>
<body>

  <div style="position:relative">

</nav>
<div id="mobile-search"><div class="search-wrap" style="width:100%">

</div></div>

<button id="back-btn" onclick="goBack()">

</button>

<div id="home-page">
  <div id="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-bg-next" id="hero-bg-next"></div>
    <div class="hero-grad"></div>
    <div class="hero-content" id="hero-content">
      <div class="hero-tag">Trending Now</div>
      <div class="hero-title" id="hero-title">Loading...</div>
      <div class="hero-meta" id="hero-meta"></div>
      <div class="hero-desc" id="hero-desc"></div>
      <div class="hero-actions">
        <button class="btn-primary" id="hero-btn" onclick="">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
          Watch Now
        </button>
        <button class="btn-secondary" id="hero-info-btn" onclick="">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>

        </button>
        <button class="btn-list" id="hero-list-btn" onclick="">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="hero-list-icon"><path d="M12 5v14M5 12h14"/></svg>

    <div class="hero-arrows">

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>

      <button class="hero-arrow" onclick="heroNav(1)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
      </button>

    <div class="hero-dots" id="hero-dots"></div>

</div>

<div id="detail-page">
  <div class="detail-backdrop">
    <div class="detail-backdrop-bg" id="d-backdrop"></div>
    <div class="detail-backdrop-grad"></div>
  </div>
  <div class="detail-layout">
    <div id="d-poster-col">

    <div id="d-info-col">
      <div class="detail-title" id="d-title"></div>

      <div class="detail-meta" id="d-meta"></div>

        <button class="btn-secondary" id="d-trailer-btn" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>

        </button>
        <button class="btn-secondary" onclick="shareDetail()" title="Share">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Share

      <div id="player-wrap">
        <iframe id="player" allowfullscreen allow="autoplay; encrypted-media; fullscreen"></iframe>
        <div class="player-bar">

<div id="search-page">
  <div class="search-page-header">
    <div class="search-page-title">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

    </div>

<div id="list-page">
  <div class="list-header">

      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      My List
      <span class="list-count" id="list-count-label">0 titles</span>
    </h1>
    <div class="list-filter-tabs">
      <div class="filter-tab active" onclick="setListFilter('all',this)">All</div>
      <div class="filter-tab" onclick="setListFilter('movie',this)">Movies</div>
      <div class="filter-tab" onclick="setListFilter('tv',this)">TV</div>
    </div>
  </div>
  <div id="list-grid-area"></div>
</div>

<div id="toast-container"></div>

<script>
const API_KEY = '4305cb5b3a4d749637ce9333285844b2';
const API_BASE = 'https://api.themoviedb.org/3';
const IMG_BASE = 'https://image.tmdb.org/t/p';
const cache = {};

let heroList = [], heroIdx = 0, heroTimer = null, heroTransitioning = false;
let currentDetailItem = null, currentDetailType = 'movie';
let playerOpen = false;
let searchMovieResults = [], searchTVResults = [];
let mediaFilter = 'all', listFilter = 'all';
let activePage = 'home';
let searchDelay = null;
let dropdownDelay = null;
let mobileMenuOpen = false;
let continueWatching = JSON.parse(localStorage.getItem('zorflix_continue') || '[]');
let watchlist = JSON.parse(localStorage.getItem('zorflix_watchlist') || '[]');
let searchHistory = JSON.parse(localStorage.getItem('zorflix_search_history') || '[]');
let themeMode = localStorage.getItem('zorflix_theme') || 'dark';
let currentSeasons = [];

function applyTheme() {
  document.body.classList.toggle('light-mode', themeMode === 'light');
  const btn = document.getElementById('theme-btn');
  btn.innerHTML = themeMode === 'dark'
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
}
function toggleTheme() {
  themeMode = themeMode === 'dark' ? 'light' : 'dark';
  localStorage.setItem('zorflix_theme', themeMode);
  applyTheme();
}
applyTheme();

async function apiFetch(path, params = {}) {
  const qs = new URLSearchParams({ api_key: API_KEY, ...params });
  const url = `${API_BASE}/${path}?${qs}`;
  if (cache[url]) return cache[url];
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.status);
  const data = await r.json();
  cache[url] = data;
  return data;
}
function img(path, size = 'w342') { return path ? `${IMG_BASE}/${size}${path}` : ''; }
function title(m) { return m.title || m.name || ''; }
function year(m) { return (m.release_date || m.first_air_date || '').slice(0, 4); }
function rating(m) { return m.vote_average ? m.vote_average.toFixed(1) : '—'; }
function isNew(m) {
  const d = m.release_date || m.first_air_date;
  if (!d) return false;
  const diff = (Date.now() - new Date(d)) / (1000 * 60 * 60 * 24 * 30);
  return diff >= 0 && diff <= 6;
}

window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 30);
});

document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search-input').blur();
    document.getElementById('search-dropdown').classList.remove('open');
  }
  if (e.key === 'ArrowLeft' && activePage === 'home') heroNav(-1);
  if (e.key === 'ArrowRight' && activePage === 'home') heroNav(1);
});

function saveWatchlist() { localStorage.setItem('zorflix_watchlist', JSON.stringify(watchlist)); updateListBadge(); }
function isInList(id, type) { return watchlist.some(i => i.id === id && i.type === type); }
function toggleList(item) {
  const idx = watchlist.findIndex(i => i.id === item.id && i.type === item.type);
  if (idx >= 0) { watchlist.splice(idx, 1); showToast('Removed from My List', 'red'); }
  else { watchlist.unshift(item); showToast('Added to My List', 'green'); }
  saveWatchlist();
  updateListBadge();
}
function updateListBadge() {
  const badge = document.getElementById('list-badge');
  const n = watchlist.length;
  badge.textContent = n > 9 ? '9+' : n;
  badge.style.display = n > 0 ? 'flex' : 'none';
}
updateListBadge();

function addContinueWatching(item) {
  continueWatching = continueWatching.filter(i => !(i.id === item.id && i.type === item.type));
  continueWatching.unshift({ ...item, progress: 35 });
  continueWatching = continueWatching.slice(0, 20);
  localStorage.setItem('zorflix_continue', JSON.stringify(continueWatching));
}

function addSearchHistory(q) {
  searchHistory = searchHistory.filter(h => h !== q);
  searchHistory.unshift(q);
  searchHistory = searchHistory.slice(0, 10);
  localStorage.setItem('zorflix_search_history', JSON.stringify(searchHistory));
}
function removeSearchHistory(q) {
  searchHistory = searchHistory.filter(h => h !== q);
  localStorage.setItem('zorflix_search_history', JSON.stringify(searchHistory));
  renderSearchHistoryBlock();
}

function showToast(msg, color = 'green') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span class="toast-dot ${color}"></span>${msg}`;
  c.appendChild(t);
  requestAnimationFrame(() => { requestAnimationFrame(() => { t.classList.add('show'); }); });
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 300);
  }, 2500);
}

function showPage(page) {
  ['home-page','detail-page','search-page','list-page'].forEach(id => {
    document.getElementById(id).style.display = id === page + '-page' ? 'block' : 'none';
  });
  ['nl-home','nl-movies','nl-tv','nl-list'].forEach(id => {
    document.getElementById(id)?.classList.remove('active');
  });
  const backBtn = document.getElementById('back-btn');
  backBtn.style.display = (page === 'detail' || page === 'search' || page === 'list') ? 'flex' : 'none';
  activePage = page;
}

function showHome() {
  showPage('home');
  document.getElementById('nl-home').classList.add('active');
  if (!heroList.length) init();
  else { clearInterval(heroTimer); heroIdx = 0; runHero(); }
}
function goBack() {
  closePlayer();
  showHome();
}
function showList() {
  showPage('list');
  document.getElementById('nl-list').classList.add('active');
  renderListPage();
  window.scrollTo(0, 0);
}
function browseMovies() {
  showPage('home');
  document.getElementById('nl-movies').classList.add('active');
  document.getElementById('main-content').innerHTML = '';
  loadMovieBrowse();
}
function browseTV() {
  showPage('home');
  document.getElementById('nl-tv').classList.add('active');
  document.getElementById('main-content').innerHTML = '';
  loadTVBrowse();
}

function toggleMobileMenu() {
  mobileMenuOpen = !mobileMenuOpen;
  document.getElementById('mobile-menu').style.display = mobileMenuOpen ? 'block' : 'none';
}
function closeMobileMenu() {
  mobileMenuOpen = false;
  document.getElementById('mobile-menu').style.display = 'none';
}

function buildHeroDots() {
  const el = document.getElementById('hero-dots');
  el.innerHTML = heroList.slice(0,6).map((_, i) =>
    `<div class="hero-dot${i===0?' active':''}" onclick="goToHero(${i})"></div>`
  ).join('');
}
function updateHeroDots() {
  document.querySelectorAll('.hero-dot').forEach((d, i) => d.classList.toggle('active', i === heroIdx));
}
function goToHero(idx) { if (heroTransitioning) return; heroIdx = idx; showHero(heroList[idx]); }
function heroNav(dir) {
  if (heroTransitioning) return;
  heroIdx = (heroIdx + dir + heroList.length) % heroList.length;
  showHero(heroList[heroIdx]);
}
function showHero(m) {
  heroTransitioning = true;
  const bg = document.getElementById('hero-bg');
  const next = document.getElementById('hero-bg-next');
  const newUrl = `url(${img(m.backdrop_path, 'original')})`;
  next.style.backgroundImage = newUrl;
  next.style.opacity = '0';
  next.style.transition = 'none';
  requestAnimationFrame(() => {
    next.style.transition = 'opacity .6s ease';
    next.style.opacity = '1';
    setTimeout(() => {
      bg.style.backgroundImage = newUrl;
      next.style.opacity = '0';
      heroTransitioning = false;
    }, 600);
  });
  const type = m.media_type === 'tv' ? 'tv' : 'movie';
  document.getElementById('hero-title').textContent = title(m);
  document.getElementById('hero-desc').textContent = m.overview;
  document.getElementById('hero-meta').innerHTML =
    `<span class="hero-rating">★ ${rating(m)}</span>` +
    (year(m) ? `<span class="hero-year">${year(m)}</span>` : '') +
    (m.original_language && m.original_language !== 'en' ? `<span class="hero-year" style="background:rgba(255,255,255,.1);padding:2px 8px;border-radius:4px;font-size:.7rem;text-transform:uppercase">${m.original_language}</span>` : '');
  document.getElementById('hero-btn').onclick = () => openDetail(m, type);
  document.getElementById('hero-info-btn').onclick = () => openDetail(m, type);
  updateHeroListBtn(m, type);
  document.getElementById('hero-list-btn').onclick = () => {
    toggleList({ id: m.id, type, title: title(m), poster: m.poster_path, backdrop: m.backdrop_path, rating: m.vote_average, year: year(m) });
    updateHeroListBtn(m, type);
  };
  updateHeroDots();
}
function updateHeroListBtn(m, type) {
  const btn = document.getElementById('hero-list-btn');
  const icon = document.getElementById('hero-list-icon');
  const inList = isInList(m.id, type);
  btn.classList.toggle('in-list', inList);
  icon.innerHTML = inList
    ? '<polyline points="20 6 9 17 4 12"/>'
    : '<path d="M12 5v14M5 12h14"/>';
  btn.childNodes[btn.childNodes.length-1].textContent = inList ? ' In List' : ' My List';
}
function runHero() {
  if (!heroList.length) return;
  showHero(heroList[heroIdx]);
  clearInterval(heroTimer);
  heroTimer = setInterval(() => {
    heroIdx = (heroIdx + 1) % Math.min(heroList.length, 6);
    showHero(heroList[heroIdx]);
  }, 6500);
}

function makeSkeletonRow(label) {
  return `<div class="section-block">
    <div class="section-header"><span class="section-label">${label}</span></div>
    <div class="row-outer"><div class="row-scroll">
      ${Array(8).fill('<div class="skeleton-card skeleton"></div>').join('')}
    </div></div>
  </div>`;
}
function makeCard(m, type) {
  const t = type || (m.media_type === 'tv' ? 'tv' : 'movie');
  const poster = img(m.poster_path, 'w342');
  const r = rating(m);
  const yr = year(m);
  const inList = isInList(m.id, t);
  const hasProgress = continueWatching.find(c => c.id === m.id && c.type === t);
  return `<div class="card" onclick="openDetail(${JSON.stringify(m).replace(/"/g,'&quot;')}, '${t}')">
    ${poster ? `<img src="${poster}" loading="lazy" alt="${title(m).replace(/"/g,'&quot;')}">` : `<div style="width:100%;height:100%;background:var(--bg3);display:flex;align-items:center;justify-content:center;padding:8px;font-size:.7rem;text-align:center;color:var(--txt3)">${title(m)}</div>`}
    <div class="card-badges">
      ${isNew(m) ? '<span class="badge badge-new">New</span>' : ''}
      ${m.vote_average >= 8 && !isNew(m) ? '<span class="badge badge-top">Top</span>' : ''}
      ${(type === 'tv' || m.media_type === 'tv') ? '<span class="badge badge-tv">TV</span>' : ''}
    </div>
    <div class="card-rating-top">★ ${r}</div>
    <div class="card-play"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"/></svg></div>
    <button class="card-list-btn${inList ? ' in-list' : ''}" onclick="event.stopPropagation();cardToggleList(event,${m.id},'${t}','${title(m).replace(/'/g,"\\'")}','${m.poster_path||''}','${m.backdrop_path||''}',${m.vote_average},'${yr}')">
      ${inList ? '✓' : '+'}
    </button>
    <div class="card-overlay">
      <div class="card-title">${title(m)}</div>
      <div class="card-meta"><span class="card-rating">★ ${r}</span><span>${yr}</span></div>
    </div>
    ${hasProgress ? `<div class="progress-bar"><div class="progress-fill" style="width:${hasProgress.progress}%"></div></div>` : ''}
  </div>`;
}
function cardToggleList(e, id, type, t, poster, backdrop, r, yr) {
  e.stopPropagation();
  const item = { id, type, title: t, poster: poster||null, backdrop: backdrop||null, rating: r, year: yr };
  toggleList(item);
  const btn = e.currentTarget;
  const inList = isInList(id, type);
  btn.classList.toggle('in-list', inList);
  btn.textContent = inList ? '✓' : '+';
}

function makeRow(label, movies, type, showSeeAll) {
  if (!movies || !movies.length) return '';
  const cards = movies.filter(m => m.poster_path).map(m => makeCard(m, type)).join('');
  return `<div class="section-block">
    <div class="section-header">
      <span class="section-label">${label}</span>
      ${showSeeAll ? `<span class="see-all-btn" onclick="">See All</span>` : ''}
    </div>
    <div class="row-outer">
      <div class="row-fade-left" id="fade-left-${label.replace(/\s/g,'_')}"></div>
      <div class="row-fade-right"></div>
      <button class="row-btn row-btn-left" onclick="scrollRow(this,-1)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button>
      <button class="row-btn row-btn-right" onclick="scrollRow(this,1)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></button>
      <div class="row-scroll" onscroll="onRowScroll(this,'${label.replace(/\s/g,'_')}')">${cards}</div>
    </div>
  </div>`;
}
function scrollRow(btn, dir) {
  const row = btn.parentElement.querySelector('.row-scroll');
  row.scrollBy({ left: dir * 480, behavior: 'smooth' });
}
function onRowScroll(el, label) {
  const fl = document.getElementById('fade-left-' + label);
  if (fl) fl.style.display = el.scrollLeft > 10 ? 'block' : 'none';

async function openDetail(m, type) {
  clearInterval(heroTimer);
  currentDetailItem = m;
  currentDetailType = type;
  showPage('detail');
  window.scrollTo(0, 0);
  closePlayer();

  document.getElementById('d-title').textContent = title(m);
  document.getElementById('d-tagline').style.display = 'none';
  document.getElementById('d-overview').textContent = m.overview || '';
  document.getElementById('d-backdrop').style.backgroundImage = `url(${img(m.backdrop_path || m.poster_path, 'original')})`;
  document.getElementById('d-poster').src = img(m.poster_path, 'w500');
  document.getElementById('d-meta').innerHTML = '';
  document.getElementById('d-cast').innerHTML = '';
  document.getElementById('d-similar').innerHTML = '';
  document.getElementById('d-stats').innerHTML = '';
  document.getElementById('d-extra-info').innerHTML = '';
  document.getElementById('d-trailer-btn').style.display = 'none';
  document.getElementById('tv-controls').style.display = 'none';
  updateDetailListBtn();
  addContinueWatching({ id: m.id, type, title: title(m), poster: m.poster_path, backdrop: m.backdrop_path, rating: m.vote_average, year: year(m), progress: 35 });

  try {
    const [details, credits, similar, videos] = await Promise.all([
      apiFetch(`${type}/${m.id}`),
      apiFetch(`${type}/${m.id}/credits`),
      apiFetch(`${type}/${m.id}/similar`),
      apiFetch(`${type}/${m.id}/videos`),
    ]);

    if (type === 'tv' && details.seasons) {
      currentSeasons = details.seasons.filter(s => s.season_number > 0);
      populateSeasons();
    } else {
      document.getElementById('tv-controls').style.display = 'none';
    }

    if (details.tagline) {
      document.getElementById('d-tagline').textContent = `"${details.tagline}"`;
      document.getElementById('d-tagline').style.display = 'block';
    }

    const yr = (details.release_date || details.first_air_date || '').slice(0,4);
    const rt = details.vote_average ? details.vote_average.toFixed(1) : '—';
    let metaHtml = `<span class="star-badge">★ ${rt}</span>`;
    if (yr) metaHtml += `<span class="meta-item">📅 ${yr}</span>`;
    if (details.runtime) metaHtml += `<span class="meta-item">⏱ ${Math.floor(details.runtime/60)}h ${details.runtime%60}m</span>`;
    if (details.number_of_seasons) metaHtml += `<span class="meta-item">📺 ${details.number_of_seasons} Season${details.number_of_seasons>1?'s':''}</span>`;
    if (details.original_language) metaHtml += `<span class="meta-item" style="text-transform:uppercase">${details.original_language}</span>`;
    (details.genres || []).slice(0,3).forEach(g => { metaHtml += `<span class="genre-pill">${g.name}</span>`; });
    document.getElementById('d-meta').innerHTML = metaHtml;

    if (details.overview) document.getElementById('d-overview').textContent = details.overview;

    let statsHtml = '';
    if (details.budget > 0) statsHtml += `<div class="detail-stat"><label>Budget</label>$${(details.budget/1e6).toFixed(0)}M</div>`;
    if (details.revenue > 0) statsHtml += `<div class="detail-stat"><label>Revenue</label>$${(details.revenue/1e6).toFixed(0)}M</div>`;
    if (details.status) statsHtml += `<div class="detail-stat"><label>Status</label>${details.status}</div>`;
    if (details.vote_count) statsHtml += `<div class="detail-stat"><label>Votes</label>${details.vote_count.toLocaleString()}</div>`;
    document.getElementById('d-stats').innerHTML = statsHtml;

    let extraHtml = '';
    const director = (credits.crew||[]).find(c => c.job === 'Director');
    if (director) extraHtml += `<b>Director:</b> ${director.name}<br>`;
    const creators = details.created_by || [];
    if (creators.length) extraHtml += `<b>Created by:</b> ${creators.map(c=>c.name).join(', ')}<br>`;
    const prodCos = (details.production_companies||[]).slice(0,3);
    if (prodCos.length) extraHtml += `<b>Studios:</b> ${prodCos.map(c=>c.name).join(', ')}<br>`;
    const langs = (details.spoken_languages||[]).map(l=>l.name).join(', ');
    if (langs) extraHtml += `<b>Languages:</b> ${langs}<br>`;
    document.getElementById('d-extra-info').innerHTML = extraHtml;

    const cast = (credits.cast || []).slice(0, 10);
    document.getElementById('d-cast').innerHTML = cast.map(c => {
      const photo = img(c.profile_path, 'w185');
      return `<div class="cast-card">
        <div class="cast-photo">${photo ? `<img src="${photo}" alt="${c.name}" loading="lazy">` : `<div class="cast-initial">${c.name.charAt(0)}</div>`}</div>
        <div class="cast-name" title="${c.name}">${c.name}</div>
        <div class="cast-char" title="${c.character}">${c.character}</div>
      </div>`;
    }).join('');

    const simMovies = (similar.results || []).filter(s => s.poster_path).slice(0, 12);
    document.getElementById('d-similar').innerHTML = simMovies.length
      ? simMovies.map(s => makeCard(s, type)).join('')
      : '<div style="color:var(--txt3);font-size:.85rem;padding:20px 0">No similar titles found.</div>';

    const trailer = (videos.results || []).find(v => v.type === 'Trailer' && v.site === 'YouTube')
      || (videos.results || []).find(v => v.site === 'YouTube');
    if (trailer) {
      const btn = document.getElementById('d-trailer-btn');
      btn.style.display = 'flex';
      btn.onclick = () => window.open(`https://www.youtube.com/watch?v=${trailer.key}`, '_blank');
    }
  } catch(e) { console.error(e); }
}

function closePlayer() {

function onSearchFocus() {

}
function onSearchBlur() {

function onSearchKey(e) {
  if (e.key === 'Enter') {
    const q = document.getElementById('search-input').value.trim();
    if (q) { doFullSearch(q); document.getElementById('search-input').blur(); }

async function onSearchInput() {
  const q = document.getElementById('search-input').value.trim();
  clearTimeout(dropdownDelay);
  if (!q) { document.getElementById('search-dropdown').classList.remove('open'); return; }
  dropdownDelay = setTimeout(async () => {
    try {
      const d = await apiFetch('search/multi', { query: q });
      renderSearchDropdown((d.results || []).filter(r => r.poster_path || r.profile_path).slice(0, 5));
    } catch(e) {}
  }, 250);

function renderSearchDropdown(results) {
  const dd = document.getElementById('search-dropdown');
  if (!results.length) { dd.classList.remove('open'); return; }
  dd.innerHTML = results.map(r => {
    const t = r.title || r.name || '';
    const yr = (r.release_date || r.first_air_date || '').slice(0,4);
    const p = img(r.poster_path || r.profile_path, 'w92');

    return `<div class="dropdown-item" onclick="openDetail(${JSON.stringify(r).replace(/"/g,'&quot;')},'${type}');document.getElementById('search-dropdown').classList.remove('open');document.getElementById('search-input').value=''">
      ${p ? `<img class="dropdown-poster" src="${p}" alt="">` : `<div class="dropdown-poster" style="background:var(--bg4)"></div>`}
      <div class="dropdown-info"><div class="dropdown-title">${t}</div><div class="dropdown-year">${yr}</div></div>
    </div>`;
  }).join('');
  dd.classList.add('open');
}
function onMobileSearch(e) {
  const q = e.target.value.trim();

  clearTimeout(searchDelay);
  searchDelay = setTimeout(() => doFullSearch(q), 500);
}
async function doFullSearch(q) {
  if (!q) return;
  addSearchHistory(q);
  showPage('search');
  document.getElementById('nl-home').classList.remove('active');
  document.getElementById('search-result-count').textContent = `Searching for "${q}"...`;
  document.getElementById('search-results-area').innerHTML = '<div class="search-grid">' + Array(12).fill('<div class="skeleton-card skeleton"></div>').join('') + '</div>';
  renderSearchHistoryBlock();
  window.scrollTo(0,0);
  try {
    const [movies, tv] = await Promise.all([
      apiFetch('search/movie', { query: q }),
      apiFetch('search/tv', { query: q }),
    ]);
    searchMovieResults = (movies.results || []).filter(m => m.poster_path);
    searchTVResults = (tv.results || []).filter(m => m.poster_path);
    const total = searchMovieResults.length + searchTVResults.length;
    document.getElementById('search-result-count').textContent = `${total} result${total !== 1 ? 's' : ''} for "${q}"`;
    renderSearchResults();
  } catch(e) { console.error(e); }
}
function renderSearchResults() {
  const sort = document.getElementById('sort-select').value;
  const sortFn = sort === 'rating' ? (a,b) => b.vote_average - a.vote_average
    : sort === 'date' ? (a,b) => (b.release_date||b.first_air_date||'').localeCompare(a.release_date||a.first_air_date||'')
    : sort === 'popularity' ? (a,b) => b.popularity - a.popularity : null;

  let movies = [...searchMovieResults];
  let tv = [...searchTVResults];
  if (sortFn) { movies.sort(sortFn); tv.sort(sortFn); }

  let items = [];
  if (mediaFilter === 'all' || mediaFilter === 'movie') items.push(...movies.map(m => ({ ...m, _type: 'movie' })));
  if (mediaFilter === 'all' || mediaFilter === 'tv') items.push(...tv.map(m => ({ ...m, _type: 'tv' })));

  const area = document.getElementById('search-results-area');
  if (!items.length) {
    area.innerHTML = `<div class="search-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><div style="font-size:1rem;margin-bottom:6px;color:var(--txt2)">No results found</div><div>Try different keywords</div></div>`;
    return;
  }
  area.innerHTML = `<div class="search-grid">${items.map(m => makeCard(m, m._type)).join('')}</div>`;
}
function setMediaFilter(val, btn) {
  mediaFilter = val;
  document.querySelectorAll('#search-page .filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderSearchResults();
}
function renderSearchHistoryBlock() {
  const block = document.getElementById('search-history-block');
  if (!searchHistory.length) { block.innerHTML = ''; return; }
  block.innerHTML = `<h4>Recent Searches</h4><div class="history-items">${searchHistory.map(h => `<div class="history-chip" onclick="doFullSearch('${h.replace(/'/g,"\\'")}')">${h}<span class="history-chip-x" onclick="event.stopPropagation();removeSearchHistory('${h.replace(/'/g,"\\'")}')">✕</span></div>`).join('')}</div>`;
}

function renderListPage() {
  const count = watchlist.length;
  document.getElementById('list-count-label').textContent = `${count} title${count !== 1 ? 's' : ''}`;
  document.getElementById('list-count-label').textContent = `${count} title${count !== 1 ? 's' : ''}`;
  const items = listFilter === 'all' ? watchlist : watchlist.filter(i => i.type === listFilter);
  const area = document.getElementById('list-grid-area');
  if (!watchlist.length) {
    area.innerHTML = `<div class="list-empty"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><h3>Your list is empty</h3><p>Add movies and shows while browsing</p></div>`;
    return;
  }
  if (!items.length) {
    area.innerHTML = `<div class="list-empty"><p>No ${listFilter === 'movie' ? 'movies' : 'TV shows'} in your list</p></div>`;
    return;
  }
  area.innerHTML = `<div class="list-grid">${items.map(c => {
    const poster = img(c.poster, 'w342');
    return `<div class="card" onclick="openDetail({id:${c.id},poster_path:'${c.poster||''}',backdrop_path:'${c.backdrop||''}',title:'${(c.title||'').replace(/'/g,"\\'")}',overview:'',vote_average:${c.rating}}, '${c.type}')">
      ${poster ? `<img src="${poster}" loading="lazy" alt="${c.title}">` : `<div style="width:100%;height:100%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--txt3);text-align:center;padding:8px">${c.title}</div>`}
      <div class="card-badges"><span class="badge badge-tv">${c.type === 'tv' ? 'TV' : 'Film'}</span></div>
      <div class="card-overlay">
        <div class="card-title">${c.title}</div>
        <div class="card-meta"><span class="card-rating">★ ${c.rating ? c.rating.toFixed(1) : '—'}</span><span>${c.year}</span></div>
      </div>
    </div>`;
  }).join('')}</div>`;
}
function setListFilter(val, btn) {
  listFilter = val;
  document.querySelectorAll('.list-filter-tabs .filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderListPage();
}

document.addEventListener('mousedown', e => {
  const row = e.target.closest('.row-scroll');
  if (!row) return;
  let startX = e.pageX - row.offsetLeft;
  let scrollLeft = row.scrollLeft;
  let dragging = true;
  const onMove = ev => {
    if (!dragging) return;
    ev.preventDefault();
    const x = ev.pageX - row.offsetLeft;
    row.scrollLeft = scrollLeft - (x - startX) * 1.4;
  };
  const onUp = () => { dragging = false; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

showPage('home');
document.getElementById('home-page').style.display = 'block';
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZorFlix</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #e50914;
  --accent-dark: #b00710;
  --accent-glow: rgba(229,9,20,0.4);
  --bg: #0f0f0f;
  --bg2: #161616;
  --bg3: #1e1e1e;
  --bg4: #252525;
  --bg5: #2e2e2e;
  --txt: #f1f1f1;
  --txt2: #a0a0a0;
  --txt3: #555;
  --txt4: #707070;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --glass: rgba(15,15,15,0.8);
  --radius: 14px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --nav-bg: rgba(15,15,15,0.85);
  --card-radius: 14px;
  --shadow: 0 8px 32px rgba(0,0,0,0.6);
}

.theme-gold { --bg:#0f0d00;--bg2:#1a1700;--bg3:#232000;--bg4:#2c2800;--bg5:#363200;--txt:#fff8d0;--txt2:#c8a800;--txt3:#6a5800;--txt4:#9a8000;--border:rgba(200,168,0,0.08);--border2:rgba(200,168,0,0.16);--glass:rgba(15,13,0,0.85);--nav-bg:rgba(15,13,0,0.9);--accent:#f5c518;--accent-dark:#d4a800;--accent-glow:rgba(245,197,24,0.4); }
.theme-rose { --bg:#110810;--bg2:#1c0d1a;--bg3:#261225;--bg4:#301830;--bg5:#3a1e3a;--txt:#ffe8f8;--txt2:#c08abc;--txt3:#6a3065;--txt4:#9a5095;--border:rgba(255,100,220,0.08);--border2:rgba(255,100,220,0.16);--glass:rgba(17,8,16,0.85);--nav-bg:rgba(17,8,16,0.9);--accent:#ec4899;--accent-dark:#c93080;--accent-glow:rgba(236,72,153,0.4); }
.theme-ice { --bg:#060c14;--bg2:#0c1520;--bg3:#111d2c;--bg4:#162538;--bg5:#1a2e44;--txt:#e0f0ff;--txt2:#80b8e0;--txt3:#304a60;--txt4:#4a7090;--border:rgba(120,200,255,0.08);--border2:rgba(120,200,255,0.16);--glass:rgba(6,12,20,0.85);--nav-bg:rgba(6,12,20,0.9);--accent:#38bdf8;--accent-dark:#0da0e0;--accent-glow:rgba(56,189,248,0.4); }
.theme-light { --bg:#f4f4f4;--bg2:#eaeaea;--bg3:#e0e0e0;--bg4:#d5d5d5;--bg5:#cacaca;--txt:#111;--txt2:#444;--txt3:#999;--txt4:#777;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);--glass:rgba(244,244,244,0.92);--nav-bg:rgba(244,244,244,0.95);--accent:#e50914;--accent-dark:#b00710;--accent-glow:rgba(229,9,20,0.3); }
.theme-mocha { --bg:#120e0b;--bg2:#1e1812;--bg3:#28201a;--bg4:#322820;--bg5:#3c3028;--txt:#f5ede4;--txt2:#b09070;--txt3:#6a5040;--txt4:#9a7060;--border:rgba(180,130,80,0.08);--border2:rgba(180,130,80,0.16);--glass:rgba(18,14,11,0.85);--nav-bg:rgba(18,14,11,0.9);--accent:#d97706;--accent-dark:#b86000;--accent-glow:rgba(217,119,6,0.4); }
.theme-crimson { --bg:#100008;--bg2:#1a000e;--bg3:#240016;--bg4:#2e001e;--bg5:#3a0026;--txt:#ffe0ec;--txt2:#c06080;--txt3:#6a1030;--txt4:#9a3050;--border:rgba(220,20,60,0.08);--border2:rgba(220,20,60,0.16);--glass:rgba(16,0,8,0.85);--nav-bg:rgba(16,0,8,0.9);--accent:#dc143c;--accent-dark:#b00028;--accent-glow:rgba(220,20,60,0.45); }
.theme-neon { --bg:#030a03;--bg2:#06120a;--bg3:#091a0e;--bg4:#0c2212;--bg5:#0f2a16;--txt:#e0ffe4;--txt2:#60c070;--txt3:#1a5020;--txt4:#3a7040;--border:rgba(57,255,20,0.07);--border2:rgba(57,255,20,0.14);--glass:rgba(3,10,3,0.85);--nav-bg:rgba(3,10,3,0.9);--accent:#39ff14;--accent-dark:#22cc00;--accent-glow:rgba(57,255,20,0.4); }
.theme-amber { --bg:#0e0900;--bg2:#1a1200;--bg3:#241a00;--bg4:#2e2200;--bg5:#382a00;--txt:#fff8e0;--txt2:#c09040;--txt3:#6a4800;--txt4:#9a7020;--border:rgba(255,140,0,0.08);--border2:rgba(255,140,0,0.15);--glass:rgba(14,9,0,0.85);--nav-bg:rgba(14,9,0,0.9);--accent:#ff8c00;--accent-dark:#d47000;--accent-glow:rgba(255,140,0,0.4); }
.theme-teal { --bg:#00080e;--bg2:#001218;--bg3:#001c24;--bg4:#00262e;--bg5:#003038;--txt:#e0f8ff;--txt2:#60c0d8;--txt3:#106880;--txt4:#309ab8;--border:rgba(0,180,216,0.08);--border2:rgba(0,180,216,0.16);--glass:rgba(0,8,14,0.85);--nav-bg:rgba(0,8,14,0.9);--accent:#00b4d8;--accent-dark:#0090b0;--accent-glow:rgba(0,180,216,0.4); }
.theme-violet { --bg:#0d0012;--bg2:#180020;--bg3:#20002e;--bg4:#28003a;--bg5:#320048;--txt:#f0e0ff;--txt2:#c080e0;--txt3:#60107a;--txt4:#9040b8;--border:rgba(148,0,211,0.08);--border2:rgba(148,0,211,0.16);--glass:rgba(13,0,18,0.85);--nav-bg:rgba(13,0,18,0.9);--accent:#9400d3;--accent-dark:#7000aa;--accent-glow:rgba(148,0,211,0.45); }
.theme-slate { --bg:#080c14;--bg2:#0d1220;--bg3:#12182c;--bg4:#171e38;--bg5:#1c2444;--txt:#e8ecf8;--txt2:#7a8aaa;--txt3:#354060;--txt4:#556080;--border:rgba(148,163,184,0.07);--border2:rgba(148,163,184,0.14);--glass:rgba(8,12,20,0.85);--nav-bg:rgba(8,12,20,0.9);--accent:#94a3b8;--accent-dark:#7080a0;--accent-glow:rgba(148,163,184,0.3); }
.theme-coral { --bg:#120504;--bg2:#1e0a08;--bg3:#280f0d;--bg4:#321412;--bg5:#3c1918;--txt:#ffe8e6;--txt2:#c07070;--txt3:#6a2020;--txt4:#9a4040;--border:rgba(255,107,107,0.08);--border2:rgba(255,107,107,0.16);--glass:rgba(18,5,4,0.85);--nav-bg:rgba(18,5,4,0.9);--accent:#ff6b6b;--accent-dark:#e04040;--accent-glow:rgba(255,107,107,0.4); }
.theme-lime { --bg:#040a00;--bg2:#081500;--bg3:#0d1e00;--bg4:#122800;--bg5:#173200;--txt:#f0ffe0;--txt2:#90c840;--txt3:#3a6000;--txt4:#6a9020;--border:rgba(163,230,53,0.07);--border2:rgba(163,230,53,0.14);--glass:rgba(4,10,0,0.85);--nav-bg:rgba(4,10,0,0.9);--accent:#a3e635;--accent-dark:#80c010;--accent-glow:rgba(163,230,53,0.4); }

.amoled-on { --bg:#000000!important;--bg2:#000000!important;--bg3:#0a0a0a!important;--bg4:#111!important;--bg5:#161616!important; }

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;overflow-x:hidden;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.22)}

#profile-loading {
  position:fixed;inset:0;z-index:99999;background:#000;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s;
}
#profile-loading.show { display:flex; }
#profile-loading.visible { opacity:1; }
#profile-loading.fade-out { opacity:0; }
.pl-ring {
  width:72px;height:72px;border-radius:50%;
  border:4px solid rgba(255,255,255,.1);
  border-top-color:var(--accent);
  animation:plSpin .75s linear infinite;
  margin-bottom:28px;
}
@keyframes plSpin { to { transform:rotate(360deg); } }
.pl-logo {
  font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:6px;
  color:rgba(255,255,255,.55);animation:plPulse 1.5s ease-in-out infinite;
}
@keyframes plPulse { 0%,100%{opacity:.4} 50%{opacity:.9} }

#profile-screen {
  position:fixed;inset:0;z-index:9999;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .5s,transform .5s;
}
#profile-screen.hide{opacity:0;transform:scale(1.06);pointer-events:none}
.profile-screen-logo{font-family:'Bebas Neue',cursive;font-size:3rem;color:var(--accent);letter-spacing:8px;margin-bottom:48px}
.profile-screen-title{font-size:1.4rem;font-weight:300;color:rgba(255,255,255,.7);margin-bottom:40px;letter-spacing:.5px}
.profiles-grid{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;margin-bottom:40px}
.profile-item{
  display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);
  animation:profilePop .4s cubic-bezier(.34,1.56,.64,1) both;
}
.profile-item:nth-child(1){animation-delay:.05s}
.profile-item:nth-child(2){animation-delay:.12s}
.profile-item:nth-child(3){animation-delay:.19s}
.profile-item:nth-child(4){animation-delay:.26s}
@keyframes profilePop{from{opacity:0;transform:scale(.7) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.profile-item:hover{transform:scale(1.1) translateY(-4px)}
.profile-item:active{transform:scale(.95)}
.profile-avatar{
  width:90px;height:90px;border-radius:12px;
  overflow:hidden;border:3px solid transparent;
  transition:border-color .2s,box-shadow .2s;
  position:relative;background:var(--bg3);
}
.profile-item:hover .profile-avatar{border-color:var(--accent);box-shadow:0 0 28px var(--accent-glow),0 0 0 1px var(--accent)}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-avatar-placeholder{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',cursive;font-size:2.5rem;color:rgba(255,255,255,.5);
}
.profile-name{font-size:.9rem;font-weight:500;color:rgba(255,255,255,.8)}
.profile-kids-badge{font-size:.6rem;background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.4);border-radius:4px;padding:2px 6px;color:#22c55e;margin-top:2px}
.profile-manage-btn{
  background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.6);
  padding:10px 28px;border-radius:6px;font-family:'Inter',sans-serif;font-size:.85rem;
  cursor:pointer;letter-spacing:1px;transition:border-color .2s,color .2s;
}
.profile-manage-btn:hover{border-color:var(--accent);color:var(--accent)}

#profile-modal{
  position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;
}
#profile-modal.open{display:flex}
.profile-modal-box{
  background:var(--bg2);border:1px solid var(--border2);border-radius:20px;
  padding:36px;width:360px;max-width:95vw;
  animation:modalIn .25s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.profile-modal-title{font-size:1.2rem;font-weight:700;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:1.2rem;transition:color .15s}
.modal-close:hover{color:var(--accent)}
.profile-list-item{
  display:flex;align-items:center;gap:14px;padding:12px;border-radius:12px;
  cursor:pointer;transition:background .15s;position:relative;
}
.profile-list-item:hover{background:var(--bg3)}
.profile-list-avatar{width:52px;height:52px;border-radius:10px;overflow:hidden;background:var(--bg4);flex-shrink:0}
.profile-list-avatar img{width:100%;height:100%;object-fit:cover}
.profile-list-avatar-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:1.5rem;color:rgba(255,255,255,.4)}
.profile-list-info{flex:1}
.profile-list-name{font-weight:600;font-size:.9rem}
.profile-list-sub{font-size:.75rem;color:var(--txt3);margin-top:2px}
.profile-pencil{
  width:30px;height:30px;border-radius:50%;background:var(--bg4);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--txt2);cursor:pointer;
  transition:background .15s,color .15s;flex-shrink:0;
}
.profile-pencil:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.add-profile-btn{
  display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;
  cursor:pointer;transition:background .15s;color:var(--txt2);margin-top:4px;
  border:1px dashed var(--border2);
}
.add-profile-btn:hover{background:var(--bg3);color:var(--txt)}
.add-profile-icon{width:52px;height:52px;border-radius:10px;background:var(--bg4);display:flex;align-items:center;justify-content:center;flex-shrink:0}

#edit-profile-modal{
  position:fixed;inset:0;z-index:8500;background:rgba(0,0,0,.9);backdrop-filter:blur(16px);
  display:none;align-items:center;justify-content:center;
}
#edit-profile-modal.open{display:flex}
.edit-modal-box{
  background:var(--bg2);border:1px solid var(--border2);border-radius:20px;
  padding:36px;width:420px;max-width:95vw;max-height:90vh;overflow-y:auto;
  animation:modalIn .25s ease;
}
.edit-modal-box h2{font-size:1.1rem;font-weight:700;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between}
.edit-avatar-wrap{display:flex;justify-content:center;margin-bottom:16px;position:relative;cursor:pointer}
.edit-avatar{width:100px;height:100px;border-radius:16px;overflow:hidden;background:var(--bg4);border:3px solid var(--border2)}
.edit-avatar img{width:100%;height:100%;object-fit:cover}
.edit-avatar-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:3rem;color:rgba(255,255,255,.3)}
.edit-avatar-overlay{
  position:absolute;bottom:0;right:calc(50% - 50px);width:100px;height:40px;
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
  border-radius:0 0 16px 16px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;
  font-size:.68rem;color:rgba(255,255,255,.7);pointer-events:none;
}

.avatar-picker-label{font-size:.7rem;font-weight:700;letter-spacing:.5px;color:var(--txt2);margin-bottom:8px;display:block;text-transform:uppercase;text-align:center}
.avatar-picker-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
.avatar-option{
  width:52px;height:52px;border-radius:10px;overflow:hidden;cursor:pointer;
  border:2.5px solid transparent;transition:border-color .18s,transform .15s,box-shadow .18s;
  flex-shrink:0;
}
.avatar-option:hover{transform:scale(1.1);border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}
.avatar-option.selected{border-color:var(--accent);box-shadow:0 0 16px var(--accent-glow)}
.avatar-option img{width:100%;height:100%;object-fit:cover}
.avatar-or{font-size:.7rem;color:var(--txt3);text-align:center;margin-bottom:12px}

.form-group{margin-bottom:16px}
.form-label{font-size:.75rem;font-weight:600;letter-spacing:.5px;color:var(--txt2);margin-bottom:6px;display:block;text-transform:uppercase}
.form-input{
  width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--txt);
  padding:11px 14px;border-radius:10px;font-family:'Inter',sans-serif;font-size:.9rem;
  outline:none;transition:border-color .2s;
}
.form-input:focus{border-color:var(--accent)}
.pin-inputs{display:flex;gap:10px}
.pin-input{
  width:50px;height:52px;text-align:center;background:var(--bg3);border:1px solid var(--border2);
  color:var(--txt);border-radius:10px;font-size:1.2rem;font-weight:700;outline:none;
  transition:border-color .2s;
}
.pin-input:focus{border-color:var(--accent)}
.edit-btns{display:flex;gap:10px;margin-top:8px}
.btn-save{flex:1;background:var(--accent);color:#fff;border:none;padding:12px;border-radius:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s,transform .1s}
.btn-save:hover{background:var(--accent-dark);transform:scale(1.02)}
.btn-cancel{flex:1;background:var(--bg4);color:var(--txt2);border:1px solid var(--border);padding:12px;border-radius:10px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s}
.btn-cancel:hover{background:var(--bg5)}
.switch-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.switch-label{font-size:.85rem;color:var(--txt2)}
.toggle-switch{position:relative;width:42px;height:24px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--bg5);border-radius:24px;cursor:pointer;transition:background .25s}
.toggle-slider:before{content:'';position:absolute;left:3px;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .25s}
.toggle-switch input:checked+.toggle-slider{background:var(--accent)}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px)}

#nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:64px;padding:0 32px;
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(to bottom,var(--nav-bg) 0%,transparent 100%);
  backdrop-filter:blur(12px);
  transition:background .3s,box-shadow .3s;
}
#nav.scrolled{background:var(--nav-bg);box-shadow:0 1px 0 var(--border)}
.logo{font-family:'Bebas Neue',cursive;font-size:2.1rem;color:var(--accent);letter-spacing:6px;cursor:pointer;flex-shrink:0;user-select:none;transition:opacity .15s}
.logo:hover{opacity:.85}
.nav-links{display:flex;gap:2px;margin-left:10px}
.nav-link{
  padding:7px 14px;border-radius:8px;font-size:.82rem;font-weight:500;
  color:var(--txt2);cursor:pointer;transition:color .15s,background .15s;white-space:nowrap;
}
.nav-link:hover,.nav-link.active{color:var(--txt);background:rgba(255,255,255,.07)}
.nav-spacer{flex:1}
.search-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:8px 14px;transition:border .2s,background .2s;width:210px;
}
.search-wrap:focus-within{border-color:var(--accent);background:var(--bg2)}
.search-wrap svg{flex-shrink:0;opacity:.35}
#search-input{background:none;border:none;outline:none;color:var(--txt);font-family:'Inter',sans-serif;font-size:.84rem;width:100%}
#search-input::placeholder{color:var(--txt3)}
.kbd-hint{font-size:.62rem;border:1px solid var(--border2);border-radius:4px;padding:1px 5px;color:var(--txt3);flex-shrink:0}
.nav-icon-btn{
  width:38px;height:38px;border-radius:10px;background:transparent;
  border:none;color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;flex-shrink:0;
}
.nav-icon-btn:hover{background:rgba(255,255,255,.08);color:var(--txt)}
.watchlist-badge{position:relative}
.badge-count{
  position:absolute;top:-5px;right:-5px;
  background:var(--accent);color:#fff;font-size:.58rem;font-weight:700;
  width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  display:none;border:2px solid var(--bg);
}
.hamburger{display:none}
.profile-nav-btn{
  width:34px;height:34px;border-radius:8px;overflow:hidden;cursor:pointer;
  border:2px solid transparent;transition:border-color .2s;flex-shrink:0;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
}
.profile-nav-btn:hover{border-color:var(--accent)}
.profile-nav-btn img{width:100%;height:100%;object-fit:cover}
.profile-nav-ph{font-family:'Bebas Neue',cursive;font-size:1rem;color:rgba(255,255,255,.5)}
@media(max-width:760px){
  .nav-links,.search-wrap,.kbd-hint{display:none}
  .hamburger{display:flex}
}
#mobile-menu{
  display:none;position:fixed;top:64px;left:0;right:0;z-index:490;
  background:var(--nav-bg);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);padding:12px 20px;
}
#mobile-menu .nav-link{display:block;padding:12px 14px;font-size:.9rem}
#mobile-search{display:none;padding:0 16px 10px}
#mobile-search .search-wrap{width:100%}
@media(max-width:760px){#mobile-search{display:block}}

#hero{height:72vh;min-height:500px;position:relative;overflow:hidden}
.hero-bg,.hero-bg-next{position:absolute;inset:0;background-size:cover;background-position:center top;transition:opacity .7s ease}
.hero-bg-next{opacity:0}
.hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(110deg,rgba(0,0,0,.92) 0%,rgba(0,0,0,.6) 38%,rgba(0,0,0,.08) 68%,transparent 100%),
             linear-gradient(to top,var(--bg) 0%,rgba(0,0,0,.55) 28%,transparent 60%);
}
.hero-content{
  position:absolute;bottom:64px;left:56px;max-width:540px;
  animation:fadeUp .5s ease both;
}
@media(max-width:640px){.hero-content{left:20px;bottom:44px;max-width:calc(100vw - 40px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hero-tag{
  font-size:.68rem;font-weight:700;letter-spacing:3px;color:var(--accent);text-transform:uppercase;
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.hero-tag::after{content:'';display:inline-block;width:24px;height:2px;background:var(--accent);border-radius:2px}
.hero-title{
  font-family:'Bebas Neue',cursive;font-size:4rem;letter-spacing:2px;line-height:1;
  margin-bottom:12px;text-shadow:0 2px 20px rgba(0,0,0,.5);
}
@media(max-width:640px){.hero-title{font-size:2.8rem}}
.hero-meta{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.hero-rating{background:var(--accent);color:#fff;padding:3px 9px;border-radius:6px;font-size:.73rem;font-weight:700}
.hero-year,.hero-lang{color:var(--txt2);font-size:.82rem}
.hero-desc{
  color:rgba(255,255,255,.75);font-size:.87rem;line-height:1.7;margin-bottom:22px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-primary{
  background:var(--accent);color:#fff;border:none;
  padding:12px 26px;border-radius:10px;font-size:.9rem;font-weight:600;
  cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s,transform .1s,box-shadow .2s;
  display:flex;align-items:center;gap:8px;
}
.btn-primary:hover{background:var(--accent-dark);transform:scale(1.03);box-shadow:0 6px 24px var(--accent-glow)}
.btn-secondary{
  background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.18);
  padding:12px 20px;border-radius:10px;font-size:.9rem;font-weight:500;
  cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s,border .2s;
  display:flex;align-items:center;gap:8px;backdrop-filter:blur(4px);
}
.btn-secondary:hover{background:rgba(255,255,255,.22)}
.btn-list{
  background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15);
  padding:12px 18px;border-radius:10px;font-size:.9rem;
  cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s,border .2s;
  display:flex;align-items:center;gap:8px;backdrop-filter:blur(4px);
}
.btn-list:hover{background:rgba(255,255,255,.16)}
.btn-list.in-list{border-color:var(--accent);color:var(--accent)}
.hero-dots{
  position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;align-items:center;
}
.hero-dot{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.22);cursor:pointer;transition:all .3s}
.hero-dot.active{width:24px;background:var(--accent)}
.hero-arrows{
  position:absolute;top:50%;transform:translateY(-50%);
  display:flex;justify-content:space-between;width:100%;padding:0 14px;pointer-events:none;
}
.hero-arrow{
  width:40px;height:40px;border-radius:50%;background:var(--glass);border:1px solid var(--border2);
  color:#fff;cursor:pointer;pointer-events:all;
  display:flex;align-items:center;justify-content:center;
  opacity:.55;transition:opacity .2s,background .2s;backdrop-filter:blur(8px);
}
.hero-arrow:hover{opacity:1;background:var(--bg4)}
</style>
</head>
<body>
<div id="profile-loading"><div class="pl-ring"></div><div class="pl-logo">ZORFLIX</div></div>
<div id="profile-screen">
  <div class="profile-screen-logo">ZORFLIX</div>
  <div class="profile-screen-title">Who's watching?</div>
  <div class="profiles-grid" id="profiles-grid"></div>
  <button class="profile-manage-btn" onclick="openProfileModal()">MANAGE PROFILES</button>
</div>
<div id="profile-modal">
  <div class="profile-modal-box">
    <div class="profile-modal-title">Manage Profiles <button class="modal-close" onclick="closeProfileModal()">&times;</button></div>
    <div id="profile-manage-list"></div>
    <div class="add-profile-btn" onclick="openEditProfile(-1)">
      <div class="add-profile-icon"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
      <span>Add Profile</span>
    </div>
  </div>
</div>
<div id="edit-profile-modal">
  <div class="edit-modal-box">
    <h2 id="edit-modal-title">Edit Profile</h2>
    <div class="avatar-picker-label">Choose Avatar</div>
    <div class="avatar-picker-grid" id="avatar-picker-grid"></div>
    <div class="avatar-or">OR</div>
    <div class="form-group">
      <label class="form-label">Profile Name</label>
      <input type="text" id="edit-name" class="form-input" placeholder="Enter name">
    </div>
    <div class="switch-row">
      <div class="switch-label">Kids Profile?</div>
      <label class="toggle-switch"><input type="checkbox" id="edit-kids"><span class="toggle-slider"></span></label>
    </div>
    <div class="form-group" style="margin-top:10px">
      <label class="form-label">Profile PIN (Optional)</label>
      <div class="pin-inputs">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
      </div>
    </div>
    <div class="edit-btns">
      <button class="btn-save" onclick="saveProfile()">Save</button>
      <button class="btn-cancel" onclick="closeEditProfile()">Cancel</button>
    </div>
    <button id="delete-profile-btn" style="width:100%;background:none;border:none;color:var(--txt4);font-size:.75rem;margin-top:20px;cursor:pointer;text-decoration:underline" onclick="deleteProfile()">Delete Profile</button>
  </div>
</div>
<nav id="nav">
  <div class="logo" onclick="showPage('home')">ZORFLIX</div>
  <div class="nav-links">
    <div class="nav-link active" onclick="showPage('home')">Home</div>
    <div class="nav-link" onclick="showPage('movies')">Movies</div>
    <div class="nav-link" onclick="showPage('tv')">TV Shows</div>
    <div class="nav-link" onclick="showPage('new')">New & Popular</div>
  </div>
  <div class="nav-spacer"></div>
  <div class="search-wrap">
    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <input type="text" id="search-input" placeholder="Titles, genres..." oninput="handleSearch(this.value)">
    <div class="kbd-hint">/</div>
  </div>
  <button class="nav-icon-btn watchlist-badge" onclick="showPage('watchlist')">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 3v18l7-5 7 5V3z"/></svg>
    <div class="badge-count" id="watchlist-count">0</div>
  </button>
  <button class="nav-icon-btn" onclick="showSettings()">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1V15a2 2 0 0 1-2-2 2 2 0 0 1 2-2v-.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2v.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <div class="profile-nav-btn" onclick="openProfileModal()" id="nav-profile-btn"></div>
  <button class="nav-icon-btn hamburger" onclick="toggleMobileMenu()">
    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </button>
</nav>
<div id="mobile-menu">
  <div id="mobile-search">
    <div class="search-wrap">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" placeholder="Search..." oninput="handleSearch(this.value)">
    </div>
  </div>
  <div class="nav-link" onclick="showPage('home');toggleMobileMenu()">Home</div>
  <div class="nav-link" onclick="showPage('movies');toggleMobileMenu()">Movies</div>
  <div class="nav-link" onclick="showPage('tv');toggleMobileMenu()">TV Shows</div>
  <div class="nav-link" onclick="showPage('watchlist');toggleMobileMenu()">Watchlist</div>
</div>
<main id="home-page" style="padding-top:0">
  <div id="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-bg-next" id="hero-bg-next"></div>
    <div class="hero-grad"></div>
    <div class="hero-content" id="hero-content"></div>
    <div class="hero-dots" id="hero-dots"></div>
    <div class="hero-arrows">
      <div class="hero-arrow" onclick="prevHero()"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></div>
      <div class="hero-arrow" onclick="nextHero()"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></div>
    </div>
  </div>
  <div id="home-sections" style="position:relative;margin-top:-80px;z-index:10;padding-bottom:100px"></div>
</main>
<script>
let appInitialized = false;

function bootApp() {
  if (appInitialized) return;
  appInitialized = true;
  showPage('home');
  document.getElementById('home-page').style.display = 'block';
  updateProfileNavBtn();
  init();
}

window.onload = bootApp;
</script>
</body>
</html>
